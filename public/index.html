<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterloo Exam Generator | Premium Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <!-- Chart.js for Graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    <!-- Marked for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="app-background"></div>
    <div class="overlay-math"></div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="logo-container">
                <div class="logo-icon">
                    <img src="images/uwaterloo-logo.jpg" alt="UW Logo" class="uw-logo-img">
                </div>
                <div class="logo-text">
                    <span class="logo-title">WATERLOO</span>
                    <span class="logo-subtitle">EXAM GENERATOR</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-view="dashboard">
                    <span class="nav-icon">📝</span>
                    <span class="nav-label"><a href="index.html">Create New Exam</a></span>
                </div>
                <div class="nav-item" data-view="models">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-label"><a href="models.html">AI Models</a></span>
                </div>
                <div class="nav-item" data-view="help">
                    <span class="nav-icon">❓</span>
                    <span class="nav-label"><a href="help.html">Help</a></span>
                </div>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-workspace">
            <!-- Dashboard Content -->
            <div class="content-scroll-area">
                <div class="dashboard-grid">
                    <!-- Generation Section (Main) -->
                    <section id="generation-section" class="view-section">
                        <section class="config-card glass">
                            <h2 class="section-title">Generate a New Exam</h2>
                            
                            <div class="input-section">
                                <h3 class="input-heading">Inputs</h3>
                                <div class="input-grid">
                                    <div class="input-group">
                                        <label for="subject-select">Subject</label>
                                        <select id="subject-select">
                                            <option value="all">All Subjects</option>
                                            <option value="CS">Computer Science (CS)</option>
                                            <option value="MATH">Mathematics (MATH)</option>
                                            <option value="AMATH">Applied Math (AMATH)</option>
                                            <option value="PMATH">Pure Math (PMATH)</option>
                                            <option value="STAT">Statistics (STAT)</option>
                                            <option value="CO">Combinatorics & Optimization (CO)</option>
                                        </select>
                                    </div>
                                    <div class="input-group">
                                        <label for="course-search">Course Selection</label>
                                        <div class="searchable-select">
                                            <input type="text" id="course-search" placeholder="Search course code..."
                                                class="search-input" autocomplete="off">
                                            <button id="clear-search" class="clear-search-btn hidden">×</button>
                                            <div id="course-dropdown" class="dropdown-list hidden"></div>
                                        </div>
                                    </div>
                                    <div class="input-group">
                                        <label for="difficulty-select">Difficulty Level</label>
                                        <select id="difficulty-select">
                                            <option value="easy">Easy (Foundational)</option>
                                            <option value="medium" selected>Medium (Standard)</option>
                                            <option value="hard">Hard (Advanced / Rigorous)</option>
                                        </select>
                                    </div>
                                    <div class="input-group">
                                        <label for="exam-type">Exam Type</label>
                                        <select id="exam-type">
                                            <option value="midterm">Midterm (1.5h)</option>
                                            <option value="final">Final (2.5h)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div id="topics-section" class="topics-section hidden">
                                <h3 class="input-heading">Select Topics</h3>
                                <div id="topics-grid" class="topics-grid"></div>
                            </div>

                            <button id="generate-btn" class="generate-btn" disabled>
                                <span class="btn-text">GENERATE EXAM (AI Powered)</span>
                                <div class="loader hidden"></div>
                            </button>
                        </section>

                        <section id="results-section" class="results-section hidden">
                            <div class="tab-content glass">
                                <div class="results-header">
                                    <div class="tab-header">
                                        <button class="tab-btn active" data-tab="exam">Exam Paper</button>
                                        <button class="tab-btn" data-tab="key">Answer Key</button>
                                    </div>
                                    <button id="print-btn" class="print-btn">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M6 9V2h12v7"></path>
                                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                                            <rect x="6" y="14" width="12" height="8"></rect>
                                        </svg>
                                        Print to PDF
                                    </button>
                                </div>
                                <div id="exam-tab" class="tab-pane active">
                                    <div class="content-placeholder">Exam content will appear here...</div>
                                </div>
                                <div id="key-tab" class="tab-pane">
                                    <div class="content-placeholder">Answer key will appear here...</div>
                                </div>
                            </div>
                        </section>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="scripts/sidebar.js"></script>
    <script type="module" src="scripts/main.js"></script>
</body>

</html>
