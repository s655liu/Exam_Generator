<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UW Exam Generator | Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>UW <span class="accent">Exam Generator</span></h1>
            <p>Generate rigorous, high-quality practice exams in seconds.</p>
        </header>

        <main>
            <section class="config-card glass">
                <div class="input-grid">
                    <div class="input-group">
                        <label for="subject-select">Subject</label>
                        <select id="subject-select">
                            <option value="all">All Subjects</option>
                            <option value="CS">Computer Science (CS)</option>
                            <option value="MATH">Mathematics (MATH)</option>
                            <option value="AMATH">Applied Math (AMATH)</option>
                            <option value="PMATH">Pure Math (PMATH)</option>
                            <option value="STAT">Statistics (STAT)</option>
                            <option value="CO">Combinatorics & Optimization (CO)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="course-search">Course Selection</label>
                        <div class="searchable-select">
                            <input type="text" id="course-search" placeholder="Search course code..."
                                class="search-input" autocomplete="off">
                            <div id="course-dropdown" class="dropdown-list hidden"></div>
                        </div>
                    </div>
                    <div class="input-group full-width">
                        <label for="exam-type">Exam Type</label>
                        <select id="exam-type">
                            <option value="midterm">Midterm (1.5h)</option>
                            <option value="final">Final (2.5h)</option>
                        </select>
                    </div>
                </div>

                <div id="topics-section" class="topics-section hidden">
                    <h3>Select Topics</h3>
                    <div id="topics-grid" class="topics-grid"></div>
                </div>

                <button id="generate-btn" class="generate-btn" disabled>
                    <span class="btn-text">Generate Exam</span>
                    <div class="loader hidden"></div>
                </button>
            </section>

            <section id="results-section" class="results-section hidden">
                <div class="results-header">
                    <div class="tab-header">
                        <button class="tab-btn active" data-tab="exam">Exam Paper</button>
                        <button class="tab-btn" data-tab="key">Answer Key</button>
                    </div>
                    <button id="print-btn" class="print-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 9V2h12v7"></path>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        Print to PDF
                    </button>
                </div>
                <div class="tab-content glass">
                    <div id="exam-tab" class="tab-pane active">
                        <div class="content-placeholder">Exam content will appear here...</div>
                    </div>
                    <div id="key-tab" class="tab-pane">
                        <div class="content-placeholder">Answer key will appear here...</div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by Qwen-Max &bull; Built for Waterloo CS Students</p>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
